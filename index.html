<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY SECURITY TERMINAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-color: #ffe81f; 
            --bg-color: #050508;
            --success-green: #00ff66;
            --error-red: #ff3333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            /* 簡易的な星空の背景 */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            color: #ffffff;
            font-family: 'Orbitron', 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(10, 10, 15, 0.85);
            border: 2px solid var(--theme-color);
            border-radius: 10px;
            padding: 40px 30px;
            box-shadow: 0 0 25px rgba(255, 232, 31, 0.2);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        h1 {
            color: var(--theme-color);
            font-size: 1.8rem;
            letter-spacing: 3px;
            margin-bottom: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 232, 31, 0.5);
        }

        .subtitle {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* ヒント表示エリア */
        .hint-box {
            background: rgba(255, 232, 31, 0.05);
            border-left: 4px solid var(--theme-color);
            padding: 15px;
            margin-bottom: 25px;
            text-align: left;
            border-radius: 0 4px 4px 0;
        }

        .hint-title {
            font-size: 0.8rem;
            color: var(--theme-color);
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hint-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #dddddd;
        }

        /* 入力エリア */
        .form-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            border-radius: 5px;
            color: #ffffff;
            font-size: 1.1rem;
            font-family: inherit;
            text-align: center;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--theme-color);
            box-shadow: 0 0 15px rgba(255, 232, 31, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        /* 送信ボタン */
        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--theme-color);
            color: var(--theme-color);
            font-size: 1.1rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--theme-color);
            color: #000000;
            box-shadow: 0 0 20px var(--theme-color);
        }

        /* 結果表示エリア */
        .result-container {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s forwards;
        }

        .result-message {
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .success {
            color: var(--success-green);
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
        }

        .error {
            color: var(--error-red);
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.4);
        }

        .result-image {
            max-width: 100%;
            max-height: 350px;
            border-radius: 8px;
            border: 2px solid var(--theme-color);
            box-shadow: 0 0 15px rgba(255, 232, 31, 0.3);
            margin-top: 15px;
            object-fit: contain;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">SECURITY TERMINAL</h1>
    <div class="subtitle">ENTER PASSCODE TO DECRYPT DATA</div>

    <!-- ヒント表示エリア -->
    <div class="hint-box">
        <div class="hint-title">Transmission Hint</div>
        <div class="hint-text" id="hint-text">ロード中...</div>
    </div>

    <!-- パスワード入力 -->
    <div class="form-group">
        <input type="text" id="pass-input" placeholder="PASSCODE..." autocomplete="off">
    </div>
    <button id="submit-btn" onclick="checkPassword()">ENTER</button>

    <!-- 結果表示エリア -->
    <div id="result-container" class="result-container">
        <div id="result-message" class="result-message"></div>
        <div id="image-wrapper"></div>
    </div>
</div>

<script>
    // ==========================================
    // 【管理・編集用設定エリア】
    // 
    // ==========================================
    const CONFIG = {
        // 1. 正しいパスワード (英数字、記号、日本語など自由に設定可能)
        // ※ アルファベットの場合、大文字と小文字は区別せず判定されます。
        correctPassword: "MAY THE FORCE BE WITH YOU",

        // 2. 画面に表示するヒントメッセージ
        hintMessage: "ジェダイの有名な合言葉を入力せよ。（英語で、単語の間に半角スペースを空けて入力）",

        // 3. 成功時に表示するメッセージ
        successMessage: "【アクセス承認】フォースとともにあらんことを。ホログラム・データの復号に成功しました。",

        // 4. 成功時に表示する画像のパス、またはURL
        // ※ 同じフォルダ内の画像を指定する場合: "images/secret.jpg" のように記述
        // ※ 外部のWeb画像を指定する場合: 下記のようにURLをそのまま記述
        // ※ 画像を何も表示させない場合は "" としてください。
        successImageUrl: "https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?q=80&w=600&auto=format&fit=crop",

        // 5. パスワードを間違えた時のメッセージ
        errorMessage: "【アクセス拒否】パスワードが一致しません。帝国軍の警戒レベルが上昇中。"
    };
    // ==========================================


    // 画面ロード時にヒントをセット
    document.getElementById('hint-text').innerText = CONFIG.hintMessage;

    function checkPassword() {
        const userInput = document.getElementById('pass-input').value.trim();
        const resultContainer = document.getElementById('result-container');
        const resultMessage = document.getElementById('result-message');
        const imageWrapper = document.getElementById('image-wrapper');

        // 表示の初期化
        resultContainer.style.display = 'none';
        imageWrapper.innerHTML = '';

        // 入力値と設定したパスワードを「大文字・小文字を無視して」比較
        // もし「大文字小文字を厳密に区別したい」場合は、以下の .toLowerCase() を両方とも削除してください。
        const isCorrect = userInput.toLowerCase() === CONFIG.correctPassword.toLowerCase();

        if (isCorrect) {
            // 正解の場合の処理
            resultMessage.className = "result-message success";
            resultMessage.innerText = CONFIG.successMessage;

            // 画像のURLが設定されているか確認し、あればHTML要素を作って追加する
            if (CONFIG.successImageUrl && CONFIG.successImageUrl.trim() !== "") {
                const img = document.createElement('img');
                img.src = CONFIG.successImageUrl;
                img.alt = "Decrypted Secret Data";
                img.className = "result-image";
                imageWrapper.appendChild(img);
            }
        } else {
            // 不正解の場合の処理
            resultMessage.className = "result-message error";
            resultMessage.innerText = CONFIG.errorMessage;
        }

        // 結果をアニメーション表示
        resultContainer.style.display = 'block';
    }

    // 入力欄でEnterキーを押しても判定できるようにする
    document.getElementById('pass-input').addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            checkPassword();
        }
    });
</script>

</body>
</html>
