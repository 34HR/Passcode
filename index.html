<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY SECURITY TERMINAL</title>
    <!-- SF風のGoogle Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-color: #ffe81f; /* スターウォーズイエロー */
            --bg-color: #030308;
            --success-green: #00ff66;
            --error-red: #ff3333;
            --hologram-cyan: #00f3ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 画面全体のノイズ走査線 */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 40px);
            background-size: 350px 350px, 250px 250px;
            background-position: 40px 60px, 130px 270px;
            color: #ffffff;
            font-family: 'Orbitron', 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
            transition: background-color 0.1s ease;
        }

        /* エラー時の赤色閃光 */
        body.red-alert {
            animation: redFlash 0.4s ease-out;
        }

        @keyframes redFlash {
            0% { background-color: rgba(255, 0, 0, 0.4); }
            100% { background-color: var(--bg-color); }
        }

        /* ----------------------------------
           1. 起動システムロード画面
        ----------------------------------- */
        .boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #020205;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', monospace;
            transition: opacity 0.6s ease;
        }

        .boot-terminal {
            width: 90%;
            max-width: 500px;
            background: #05050a;
            border: 1px solid var(--theme-color);
            padding: 25px;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(255, 232, 31, 0.1);
        }

        #boot-logs {
            height: 140px;
            font-size: 0.85rem;
            color: var(--theme-color);
            text-align: left;
            overflow-y: hidden;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .log-line {
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid var(--theme-color);
            animation: typing 0.4s steps(30, end), blink 0.5s step-end infinite;
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: #111;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--theme-color);
            box-shadow: 0 0 10px var(--theme-color);
            transition: width 0.4s ease;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: var(--theme-color); }
        }

        /* ----------------------------------
           2. 正解後の特別カットイン画面
        ----------------------------------- */
        .granted-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(2, 15, 8, 0.95);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .granted-screen.show {
            opacity: 1;
            pointer-events: auto;
        }

        .granted-box {
            text-align: center;
        }

        .granted-title {
            font-size: 2.8rem;
            color: var(--success-green);
            text-shadow: 0 0 20px var(--success-green);
            letter-spacing: 6px;
            font-weight: 900;
            margin-bottom: 15px;
            animation: textGlitch 0.15s infinite alternate;
        }

        .granted-scanner {
            width: 250px;
            height: 4px;
            background: var(--success-green);
            box-shadow: 0 0 15px var(--success-green);
            margin: 0 auto 20px auto;
            animation: scannerMove 1.2s infinite ease-in-out;
        }

        .granted-status {
            font-size: 0.9rem;
            color: #ffffff;
            letter-spacing: 3px;
        }

        @keyframes scannerMove {
            0%, 100% { transform: scaleX(0.1); opacity: 0.3; }
            50% { transform: scaleX(1); opacity: 1; }
        }

        /* ----------------------------------
           3. メイン操作画面
        ----------------------------------- */
        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(10, 10, 18, 0.85);
            border: 2px solid var(--theme-color);
            border-radius: 10px;
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(255, 232, 31, 0.15);
            text-align: center;
            backdrop-filter: blur(5px);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
        }

        h1 {
            color: var(--theme-color);
            font-size: 1.8rem;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 232, 31, 0.5);
        }

        .subtitle {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 25px;
            letter-spacing: 3px;
        }

        /* 複数ヒント用リスト */
        .hint-box {
            background: rgba(255, 232, 31, 0.03);
            border: 1px solid rgba(255, 232, 31, 0.2);
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
            border-radius: 6px;
        }

        .hint-header {
            font-size: 0.8rem;
            color: var(--theme-color);
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(255, 232, 31, 0.3);
            padding-bottom: 5px;
        }

        .hint-list {
            list-style: none;
        }

        .hint-item {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 8px;
            line-height: 1.4;
            padding-left: 10px;
            border-left: 2px solid var(--theme-color);
        }

        .hint-num {
            color: var(--theme-color);
            font-weight: bold;
            margin-right: 5px;
        }

        /* 入力エリア */
        .form-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 5px;
            color: #ffffff;
            font-size: 1.1rem;
            font-family: inherit;
            text-align: center;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--theme-color);
            box-shadow: 0 0 15px rgba(255, 232, 31, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        /* ENTERボタン */
        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--theme-color);
            color: var(--theme-color);
            font-size: 1.1rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--theme-color);
            color: #000000;
            box-shadow: 0 0 25px var(--theme-color);
        }

        /* ----------------------------------
           4. 結果・ホログラム実体化アニメーション
        ----------------------------------- */
        .result-container {
            margin-top: 35px;
            display: none;
        }

        .result-message {
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .success {
            color: var(--success-green);
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
        }

        .error {
            color: var(--error-red);
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.4);
            animation: textGlitch 0.15s infinite alternate;
        }

        /* ホログラム投影ラッパー（R2-D2のビームのように下から実体化） */
        .image-scan-effect {
            position: relative;
            display: inline-block;
            max-width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--hologram-cyan);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.4);
            margin-top: 15px;
            
            /* ホログラム投影の起点（下中心） */
            transform-origin: bottom center;
            /* 1.1秒かけて縦に伸びてから横に実体化するアニメーション */
            animation: holoProject 1.1s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        /* 上下スキャンレーザー */
        .image-scan-effect::after {
            content: '';
            position: absolute;
            top: -100%; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 243, 255, 0.5), transparent);
            animation: laserScan 2.5s infinite linear;
            pointer-events: none;
        }

        /* 投影用画像 */
        .hologram-img {
            display: block;
            max-width: 100%;
            max-height: 320px;
            object-fit: contain;
            opacity: 0.95;
            animation: holoNoise 1.5s infinite steps(2);
        }

        /* 投影エフェクト（一度縦に細長く伸び、次に横に広がる） */
        @keyframes holoProject {
            0% {
                transform: scaleX(0.01) scaleY(0.01);
                filter: brightness(12) blur(8px);
                opacity: 0;
            }
            45% {
                transform: scaleX(0.01) scaleY(1.3);
                filter: brightness(6) blur(3px);
                opacity: 0.8;
            }
            65% {
                transform: scaleX(1.15) scaleY(0.9);
                filter: brightness(2) blur(1px);
                opacity: 0.9;
            }
            100% {
                transform: scaleX(1) scaleY(1);
                filter: brightness(1) blur(0px);
                opacity: 0.95;
            }
        }

        @keyframes laserScan {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        @keyframes holoNoise {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 0.75; }
            51% { opacity: 0.95; filter: skewX(1deg) brightness(1.1); }
            52% { opacity: 0.9; filter: skewX(0) brightness(1); }
        }

        @keyframes textGlitch {
            0% { transform: translate(0) }
            50% { transform: translate(-1px, 1px) }
            100% { transform: translate(1px, -1px) }
        }

        /* エラー時の筐体振動 */
        .shake {
            animation: containerShake 0.4s ease-in-out;
        }

        @keyframes containerShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

<!-- 1. ロード画面 -->
<div id="boot-screen" class="boot-screen">
    <div class="boot-terminal">
        <div id="boot-logs"></div>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>
</div>

<!-- 2. 正解カットイン画面 -->
<div id="granted-screen" class="granted-screen">
    <div class="granted-box">
        <div class="granted-title">ACCESS GRANTED</div>
        <div class="granted-scanner"></div>
        <div class="granted-status">DECRYPTING SECURE DATA...</div>
    </div>
</div>

<!-- 3. メイン画面 -->
<div class="container" id="main-container">
    <h1 id="title">SECURITY TERMINAL</h1>
    <div class="subtitle">ENTER PASSCODE TO DECRYPT DATA</div>

    <!-- ヒント枠（自動生成） -->
    <div class="hint-box">
        <div class="hint-header">AVAILABLE TRANSMISSION CODES</div>
        <ul class="hint-list" id="hint-list"></ul>
    </div>

    <!-- 入力 -->
    <div class="form-group">
        <input type="text" id="pass-input" placeholder="PASSCODE..." autocomplete="off">
    </div>
    <button id="submit-btn" onclick="checkPassword()">ENTER</button>

    <!-- 結果 -->
    <div id="result-container" class="result-container">
        <div id="result-message" class="result-message"></div>
        <div id="image-wrapper"></div>
    </div>
</div>

<script>
    // =========================================================================
    // 【管理・編集用設定エリア】
    // パスワード、ヒント、メッセージ、画像をここでお好みに書き換えてください。
    // =========================================================================
    const CONFIG = {
        passList: [
            {
                // [パスワード 1]
                password: "JEDI", 
                hint: "謎1：光の陣営に属する、フォースの守護者（英4文字）", 
                successMessage: "【アクセス承認】マスター・ヨーダの暗号ホログラムの復号に成功。",
                imageUrl: "https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?q=80&w=600&auto=format&fit=crop" 
            },
            {
                // [パスワード 2]
                password: "SITH",
                hint: "謎2：怒りと恐れから力を引き出す、闇の探求者（英4文字）",
                successMessage: "【アクセス承認】ダース・ベイダーのホログラムアーカイブが展開されました。",
                imageUrl: "https://images.unsplash.com/photo-1608889174637-3c44f6326f1a?q=80&w=600&auto=format&fit=crop"
            },
            {
                // [パスワード 3]
                password: "REBEL",
                hint: "謎3：帝国軍のデス・スターを破壊すべく抗う『同盟』（英5文字）",
                successMessage: "【アクセス承認】反乱同盟軍の極秘作戦空域ホログラムをロードしました。",
                imageUrl: "https://images.unsplash.com/photo-1618336753974-aae8e04506aa?q=80&w=600&auto=format&fit=crop"
            }
        ],

        // 不正解時のエラーメッセージ
        errorMessage: "【ACCESS DENIED】無効なアクセスコードです。セキュリティシステムが作動しました。"
    };
    // =========================================================================


    // 効果音自動生成 (Web Audio API を利用)
    let audioCtx = null;
    function playSfx(type) {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'success') {
                // シューンと周波数が上がる未来感のあるホログラム投影音
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.8);
                gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.2);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);
            } else if (type === 'error') {
                // 重低音の警告エラー音
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(90, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'click') {
                // 入力決定音
                osc.type = 'square';
                osc.frequency.setValueAtTime(1800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }
        } catch (e) {
            console.log("Audio Error:", e);
        }
    }


    // 起動システムロード処理
    const bootLogs = [
        "INITIALIZING GALAXY NETWORK TERMINAL...",
        "ESTABLISHING SECURE CONNECTION...",
        "BYPASSING IMPERIAL FIREWALL... [SUCCESS]",
        "DECRYPTING DATABASE HINTS...",
        "SYSTEM ONLINE. READY FOR INPUT."
    ];

    let logIndex = 0;
    function runBootSequence() {
        const logContainer = document.getElementById('boot-logs');
        if (logIndex < bootLogs.length) {
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerText = "> " + bootLogs[logIndex];
            logContainer.appendChild(line);

            const progress = ((logIndex + 1) / bootLogs.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';

            logIndex++;
            setTimeout(runBootSequence, 550);
        } else {
            setTimeout(() => {
                const bootScreen = document.getElementById('boot-screen');
                const mainContainer = document.getElementById('main-container');
                bootScreen.style.opacity = '0';
                
                setTimeout(() => {
                    bootScreen.style.display = 'none';
                    mainContainer.style.opacity = '1';
                    mainContainer.style.transform = 'translateY(0)';
                }, 600);
            }, 700);
        }
    }

    // 初期化（ヒントの生成）
    window.onload = () => {
        const hintListEl = document.getElementById('hint-list');
        hintListEl.innerHTML = '';
        CONFIG.passList.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = 'hint-item';
            li.innerHTML = `<span class="hint-num">[DATA-${index + 1}]</span> ${item.hint}`;
            hintListEl.appendChild(li);
        });

        runBootSequence();
    };


    // 判定処理
    function checkPassword() {
        playSfx('click');

        const userInput = document.getElementById('pass-input').value.trim();
        const mainContainer = document.getElementById('main-container');
        const resultContainer = document.getElementById('result-container');
        const resultMessage = document.getElementById('result-message');
        const imageWrapper = document.getElementById('image-wrapper');
        const grantedScreen = document.getElementById('granted-screen');

        // 表示の初期化
        resultContainer.style.display = 'none';
        imageWrapper.innerHTML = '';
        mainContainer.classList.remove('shake');
        document.body.classList.remove('red-alert');

        // 照合（大文字小文字無視）
        const matchedData = CONFIG.passList.find(
            item => userInput.toLowerCase() === item.password.toLowerCase()
        );

        if (matchedData) {
            // 【正解時】
            // 1. 特大の「ACCESS GRANTED」演出画面を展開
            grantedScreen.classList.add('show');
            setTimeout(() => { playSfx('success'); }, 150);

            // 2. 1秒後にロード画面をフェードアウトさせ、メイン筐体に画像を展開
            setTimeout(() => {
                grantedScreen.classList.remove('show');
                
                resultMessage.className = "result-message success";
                resultMessage.innerText = matchedData.successMessage;

                if (matchedData.imageUrl && matchedData.imageUrl.trim() !== "") {
                    const scanWrapper = document.createElement('div');
                    scanWrapper.className = "image-scan-effect";

                    const img = document.createElement('img');
                    img.src = matchedData.imageUrl;
                    img.alt = "Hologram";
                    img.className = "hologram-img";

                    scanWrapper.appendChild(img);
                    imageWrapper.appendChild(scanWrapper);
                }
                
                // 結果の投影表示
                resultContainer.style.display = 'block';
            }, 1000);

        } else {
            // 【不正解時】
            setTimeout(() => { playSfx('error'); }, 100);
            document.body.classList.add('red-alert');
            mainContainer.classList.add('shake');

            resultMessage.className = "result-message error";
            resultMessage.innerText = CONFIG.errorMessage;
            
            resultContainer.style.display = 'block';
        }
    }

    // Enterキー送信対応
    document.getElementById('pass-input').addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            checkPassword();
        }
    });
</script>

</body>
</html>
